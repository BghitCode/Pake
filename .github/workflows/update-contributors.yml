name: Update Contributors

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate contributors list
        run: |
          {
            echo "# Contributors"
            echo ""
            echo "Thanks to all the people who have contributed to bghitapp!"
            echo ""
            git log --format='%aN' | sort -u | grep -Ev '\[bot\]$|^Pake-Actions$|^actions-user$' | while read author; do
              echo "- $author"
            done
          } > CONTRIBUTORS.md
          echo "Generated contributors list"

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update contributors [skip ci]"
          file_pattern: CONTRIBUTORS.md
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
