name: Publish npm Package

on:
  push:
    branches: [main]
    tags: ["V*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @bghitcode/bghitapp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.26.2"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release version (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/check-release-version.mjs "$GITHUB_REF_NAME"

      - name: Auto-bump patch version (main push only)
        if: github.ref == 'refs/heads/main'
        run: |
          CURRENT=$(node --input-type=commonjs -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " --input-type=commonjs

      - name: Check formatting
        run: pnpm run format:check

      - name: Run unit tests
        run: npx vitest run

      - name: Build CLI
        run: pnpm run cli:build

      - name: Check package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish

      - name: Verify published version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          for attempt in {1..12}; do
            PUBLISHED="$(npm view "@bghitcode/bghitapp@${VERSION}" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "Published @bghitcode/bghitapp@${VERSION}"
              exit 0
            fi
            echo "Waiting for npm registry to expose @bghitcode/bghitapp@${VERSION} (attempt ${attempt}/12)"
            sleep 10
          done
          echo "@bghitcode/bghitapp@${VERSION} was not visible in npm registry after publish"
          exit 1
